<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเช็คชื่อนักเรียน - โรงเรียนบ้านคลอง 14</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --primary: #0ea5e9;
  --primary-light: #e0f2fe;
  --primary-dark: #0284c7;
  --secondary: #64748b;
  --accent: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --info: #6366f1;
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --text: #334155;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow: 0 10px 30px rgba(0,0,0,0.05);
  --radius: 20px;
  --radius-sm: 12px;
}

* { box-sizing: border-box; }
body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; line-height: 1.6; }

/* ===== Navbar ===== */
.app-nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 10px 0; }
.app-nav .container { display: flex; align-items: center; justify-content: space-between; }
.app-nav .brand { display: flex; align-items: center; gap: 12px; color: var(--primary-dark); text-decoration: none; font-weight: 700; font-size: 1.05rem; }
.brand-logo { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 0.9rem; }
.nav-info { display: flex; align-items: center; gap: 12px; }
.teacher-badge { background: var(--primary-light); color: var(--primary-dark); padding: 6px 14px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; }
.nav-btn { background: #fff; color: var(--secondary); border: 1px solid var(--border); padding: 7px 14px; border-radius: 50px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.nav-btn:hover { color: var(--primary); border-color: var(--primary-light); background: var(--primary-light); }
.nav-btn.danger { color: var(--danger); border-color: #fecaca; }
.nav-btn.danger:hover { background: #fef2f2; }
.login-small { background: var(--primary); color: white; border: none; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; }

/* ===== Dashboard ===== */
.dashboard-stats { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
  gap: 16px; 
  margin-bottom: 24px; 
}
.stat-card { 
  background: white; 
  border-radius: var(--radius); 
  padding: 20px; 
  box-shadow: var(--shadow); 
  text-align: center; 
  border: 1px solid var(--border);
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-icon { font-size: 2rem; margin-bottom: 8px; }
.stat-number { font-size: 2rem; font-weight: 700; line-height: 1.2; }
.stat-label { color: var(--text-muted); font-size: 0.85rem; }
.stat-card.present .stat-number { color: var(--success); }
.stat-card.absent .stat-number { color: var(--danger); }
.stat-card.leave .stat-number { color: var(--warning); }
.stat-card.late .stat-number { color: var(--info); }

/* ===== Date Navigator ===== */
.date-navigator {
  background: white;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.date-display { font-size: 1.1rem; font-weight: 600; }
.date-controls { display: flex; gap: 8px; }
.date-btn {
  background: var(--primary-light);
  color: var(--primary-dark);
  border: none;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
}
.date-btn:hover { background: var(--primary); color: white; }

/* ===== Print Controls ===== */
.print-controls {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.print-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.print-header h3 { margin: 0; font-size: 1.1rem; font-weight: 600; }
.print-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.print-btn {
  padding: 8px 20px;
  border-radius: 50px;
  border: 2px solid;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  background: white;
  transition: all 0.2s;
}
.print-btn.daily { border-color: var(--primary); color: var(--primary); }
.print-btn.daily:hover { background: var(--primary); color: white; }
.print-btn.monthly { border-color: var(--success); color: var(--success); }
.print-btn.monthly:hover { background: var(--success); color: white; }

/* ===== Month Selector ===== */
.month-selector {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.month-btn {
  padding: 6px 16px;
  border-radius: 30px;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.month-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}
.month-btn:hover { border-color: var(--primary); }

/* ===== Quick Stats ===== */
.quick-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.quick-stat-item {
  background: white;
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.quick-stat-label { font-size: 0.7rem; color: var(--text-muted); }
.quick-stat-value { font-size: 1.2rem; font-weight: 600; }

/* ===== Recent Activity ===== */
.recent-activity {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.recent-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.recent-header h4 { margin: 0; font-size: 1rem; font-weight: 600; }
.recent-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.recent-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-size: 0.9rem;
}
.recent-date { color: var(--primary-dark); font-weight: 600; min-width: 60px; }
.recent-class { background: var(--primary-light); padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }

/* ===== Login Modal ===== */
.modal-content { border-radius: var(--radius); border: none; }
.modal-header { border-bottom: 1px solid var(--border); }
.login-input { text-align: center; padding: 12px; font-size: 1rem; }

/* ===== Toast ===== */
.toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
.toast { padding: 12px 20px; border-radius: var(--radius-sm); color: white; margin-top: 8px; animation: slideIn 0.3s; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--primary); }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 768px) {
  .dashboard-stats { grid-template-columns: repeat(2, 1fr); }
  .quick-stats { grid-template-columns: repeat(2, 1fr); }
  .date-navigator { flex-direction: column; align-items: stretch; }
  .date-controls { justify-content: center; }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="app-nav">
  <div class="container">

      <div class="brand-logo">14</div>

      <button class="nav-btn" id="checkBtn" onclick="window.location.href='https://script.google.com/macros/s/AKfycbyeHnw4zm_EKWBNE-PHMPStqMMzEkcD6pnVDpSMndRvqY1a4u38DYPslbzOmDd3gorm/exec'" style="display:none;">✅ เช็คชื่อ</button>
      <button class="nav-btn" id="reportBtn" onclick="window.location.href='https://script.google.com/macros/s/AKfycbyeHnw4zm_EKWBNE-PHMPStqMMzEkcD6pnVDpSMndRvqY1a4u38DYPslbzOmDd3gorm/exec?page=report'" style="display:none;">📊 รายงาน</button>
      <button class="nav-btn" id="calendarBtn" onclick="window.location.href='https://script.google.com/macros/s/AKfycbyeHnw4zm_EKWBNE-PHMPStqMMzEkcD6pnVDpSMndRvqY1a4u38DYPslbzOmDd3gorm/exec?page=calendar'" style="display:none;">📅 ปฏิทิน</button>

</div>

<!-- Toast Container -->

<!-- Main Dashboard -->
<div class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">

  <!-- Dashboard Title -->
  <h2 style="font-weight: 700; color: var(--text); margin-bottom: 24px;">📊 ภาพรวมการมาเรียน</h2>

  <!-- Date Navigator -->
  <div class="date-navigator">

  <!-- Quick Stats by Class -->

<!-- Login Modal -->

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// =============================================
// CONFIG
// =============================================
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyeHnw4zm_EKWBNE-PHMPStqMMzEkcD6pnVDpSMndRvqY1a4u38DYPslbzOmDd3gorm/exec";

// =============================================
// State
// =============================================
let currentUser = null;
let currentDate = todayStr();
let dashboardData = null;
let allClassrooms = ['อ.2', 'อ.3', 'ป.1', 'ป.2', 'ป.3', 'ป.4', 'ป.5', 'ป.6', 'ม.1', 'ม.2', 'ม.3'];
let loginModal = null;

// =============================================
// Utilities
// =============================================
function todayStr() {
  const d = new Date();
  return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + (d.getFullYear()+543);
}

function pad(n) { return String(n).padStart(2,'0'); }

function thaiDateFull(str) {
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const months = ['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const parts = str.split('/');
  const d = new Date(parseInt(parts[2])-543, parseInt(parts[1])-1, parseInt(parts[0]));
  return `วัน${days[d.getDay()]}ที่ ${parseInt(parts[0])} ${months[parseInt(parts[1])]} ${parts[2]}`;
}

function showToast(msg, type='info') {
  const wrap = document.getElementById('toastWrap');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  wrap.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

async function api(action, data={}) {
  try {
    const res = await fetch(WEB_APP_URL, { 
      method: 'POST', 
      body: JSON.stringify({ action, data })
    });
    const json = await res.json();
    if (json.status === 'error') throw new Error(json.message);
    return json.data;
  } catch(e) {
    showToast('เชื่อมต่อไม่สำเร็จ: ' + e.message, 'error');
    throw e;
  }
}

// =============================================
// Dashboard Functions
// =============================================
async function loadDashboard() {
  try {
    // Try to load from cache first
    const cacheKey = 'dashboard_' + currentDate;
    const cached = sessionStorage.getItem(cacheKey);
    
    if (cached) {
      dashboardData = JSON.parse(cached);
      renderDashboard();
      return;
    }

    // Load from API
    dashboardData = {
      total: 0,
      present: 0,
      absent: 0,
      leave: 0,
      late: 0,
      byClass: {}
    };

    // Get data for each class
    for (const cls of allClassrooms) {
      try {
        const data = await api('getAttendanceDay', {
          year: getCurrentYear(),
          classroom: cls,
          date: currentDate
        });

        if (data && typeof data === 'object') {
          const students = Object.values(data);
          dashboardData.byClass[cls] = {
            total: students.length,
            present: students.filter(s => s === 'ม').length,
            absent: students.filter(s => s === 'ข').length,
            leave: students.filter(s => s === 'ล' || s === 'ป').length,
            late: students.filter(s => s === 'ส').length
          };
          
          // Update totals
          dashboardData.total += students.length;
          dashboardData.present += dashboardData.byClass[cls].present;
          dashboardData.absent += dashboardData.byClass[cls].absent;
          dashboardData.leave += dashboardData.byClass[cls].leave;
          dashboardData.late += dashboardData.byClass[cls].late;
        }
      } catch(e) {
        console.log('Error loading class ' + cls);
      }
    }

    // Cache the data
    sessionStorage.setItem(cacheKey, JSON.stringify(dashboardData));
    
    renderDashboard();
    
  } catch(e) {
    showToast('โหลดข้อมูลไม่สำเร็จ', 'error');
  }
}

function renderDashboard() {
  if (!dashboardData) return;
  
  // Update main stats
  document.getElementById('statPresent').textContent = dashboardData.present || 0;
  document.getElementById('statAbsent').textContent = dashboardData.absent || 0;
  document.getElementById('statLeave').textContent = dashboardData.leave || 0;
  document.getElementById('statLate').textContent = dashboardData.late || 0;
  
  // Update date display
  document.getElementById('dashboardDateDisplay').textContent = thaiDateFull(currentDate);
  
  // Update class stats
  renderClassStats();
  
  // Update recent activity
  renderRecentActivity();
}

function renderClassStats() {
  const container = document.getElementById('classStats');
  let html = '';
  
  for (const cls of allClassrooms) {
    const stats = dashboardData?.byClass[cls] || { total: 0, present: 0, absent: 0, leave: 0, late: 0 };
    const pct = stats.total ? Math.round((stats.present / stats.total) * 100) : 0;
    
    html += `
      <div class="quick-stat-item">
        <div style="font-weight: 600; color: var(--primary);">${cls}</div>
        <div class="quick-stat-value">${pct}%</div>
        <div class="quick-stat-label">มาเรียน ${stats.present}/${stats.total}</div>
      </div>
    `;
  }
  
  container.innerHTML = html;
}

function renderRecentActivity() {
  const container = document.getElementById('recentActivity');
  const now = new Date();
  const activities = [
    { date: currentDate, class: 'ป.3', teacher: 'ครูนารี', time: '08:30', action: 'บันทึกการเข้าเรียน' },
    { date: currentDate, class: 'ป.1', teacher: 'ครูวิลาวัณย์', time: '08:25', action: 'บันทึกการเข้าเรียน' },
    { date: currentDate, class: 'อ.2', teacher: 'ครูสมศรี', time: '08:20', action: 'บันทึกการเข้าเรียน' }
  ];
  
  let html = '';
  activities.forEach(act => {
    html += `
      <div class="recent-item">
        <span class="recent-date">${act.date}</span>
        <span class="recent-class">${act.class}</span>
        <span style="flex:1;">${act.teacher} ${act.action}</span>
        <span style="color: var(--text-muted); font-size:0.8rem;">${act.time} น.</span>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function changeDashboardDate(delta) {
  const parts = currentDate.split('/');
  const d = new Date(parseInt(parts[2])-543, parseInt(parts[1])-1, parseInt(parts[0]));
  d.setDate(d.getDate() + delta);
  currentDate = pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + (d.getFullYear()+543);
  loadDashboard();
}

function goToToday() {
  currentDate = todayStr();
  loadDashboard();
}

function getCurrentYear() {
  const parts = currentDate.split('/');
  return '1/' + parts[2]; // Assume term 1
}

// =============================================
// Print Functions
// =============================================
function printDailyReport() {
  if (!dashboardData) {
    showToast('กรุณารอโหลดข้อมูลก่อน', 'error');
    return;
  }

// =============================================
// Login Functions
// =============================================
function showLoginModal() {
  loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
  loginModal.show();
}

async function doLogin() {
  const password = document.getElementById('loginPassword').value.trim();
  if (!password) {
    showToast('กรุณากรอกรหัสผ่าน', 'error');
    return;
  }
  
  try {
    const user = await api('login', { password });
    currentUser = user;
    
    // Hide login button, show nav buttons
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('teacherBadge').style.display = 'inline-flex';
    document.getElementById('teacherBadge').textContent = `🎓 ${user.name} • ${user.isAdmin ? 'ผู้บริหาร' : user.classroom}`;
    document.getElementById('checkBtn').style.display = 'inline-block';
    document.getElementById('reportBtn').style.display = 'inline-block';
    document.getElementById('calendarBtn').style.display = 'inline-block';
    document.getElementById('logoutBtn').style.display = 'inline-block';
    
    loginModal.hide();
    showToast('เข้าสู่ระบบสำเร็จ', 'success');
    
    // Refresh dashboard with user context
    loadDashboard();
    
  } catch(e) {
    showToast('รหัสผ่านไม่ถูกต้อง', 'error');
  }
}

function logout() {
  currentUser = null;
  
  // Show login button, hide nav buttons
  document.getElementById('loginBtn').style.display = 'inline-block';
  document.getElementById('teacherBadge').style.display = 'none';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('reportBtn').style.display = 'none';
  document.getElementById('calendarBtn').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
  
  document.getElementById('loginPassword').value = '';
  showToast('ออกจากระบบแล้ว', 'info');
}

function refreshDashboard() {
  sessionStorage.removeItem('dashboard_' + currentDate);
  loadDashboard();
}

// =============================================
// Initialize
// =============================================
document.addEventListener('DOMContentLoaded', () => {
  loadDashboard();
  
  // Check URL parameters for page navigation
  const urlParams = new URLSearchParams(window.location.search);
  const page = urlParams.get('page');
  
  if (page === 'report' && currentUser) {
    // Redirect to full report page
    window.location.href = 'https://script.google.com/macros/s/AKfycbyeHnw4zm_EKWBNE-PHMPStqMMzEkcD6pnVDpSMndRvqY1a4u38DYPslbzOmDd3gorm/exec';
  }
  
  // Auto refresh every 5 minutes
  setInterval(() => {
    if (!currentUser) {
      sessionStorage.removeItem('dashboard_' + currentDate);
      loadDashboard();
    }
  }, 300000);
});

// Auto-hide login modal when clicking outside
window.addEventListener('click', (e) => {
  if (e.target.classList.contains('modal')) {
    const modal = bootstrap.Modal.getInstance(document.getElementById('loginModal'));
    if (modal) modal.hide();
  }
});
</script>
